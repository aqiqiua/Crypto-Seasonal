name: Update seasonal data

on:
  schedule:
    - cron: "10 0 * * *"      # every day at 00:10 UTC (just after the new daily candle)
  workflow_dispatch:           # adds a manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests numpy pandas
      - run: python update_data.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update data"
          git push
