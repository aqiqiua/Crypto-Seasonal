<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Seasonal Index · Crypto</title>
<style>
 :root{--bg0:#0b1018;--panel:#121b2a;--panel2:#0e1620;--edge:#1f2c3f;
   --grid:rgba(255,255,255,.055);--axis:rgba(255,255,255,.22);--now:#7d8cff;
   --ink:#e7edf6;--mut:#8a97ad;--faint:#5a6678;
   --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
   --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;}
 *{box-sizing:border-box}
 html,body{margin:0;background:radial-gradient(1200px 600px at 78% -10%,#16243a 0%,rgba(22,36,58,0) 60%),radial-gradient(900px 500px at 0% 110%,#171028 0%,rgba(23,16,40,0) 55%),var(--bg0);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
 .wrap{max-width:1180px;margin:30px auto;padding:0 16px}
 .card{background:linear-gradient(180deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--edge);border-radius:18px;box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 24px 60px rgba(0,0,0,.5);padding:22px 22px 14px}
 .head{display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;margin-bottom:8px}
 .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;color:var(--faint);text-transform:uppercase}
 .chip{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--mut);border:1px solid var(--edge);border-radius:999px;padding:4px 11px;background:rgba(255,255,255,.02)}
 .ctrls{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin:6px 0 2px}
 .grp{display:flex;gap:4px;align-items:center;padding:4px 9px;border:1px solid var(--edge);border-radius:11px;background:rgba(255,255,255,.015)}
 .grp .lab{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-right:3px}
 button{font:inherit;font-size:12px;font-weight:650;padding:6px 13px;border:1px solid transparent;background:transparent;border-radius:8px;cursor:pointer;color:var(--mut);transition:.15s}
 button:hover{color:var(--ink);background:rgba(255,255,255,.04)}button.on{background:var(--ink);color:#0b1018}
 button:focus-visible{outline:2px solid var(--now);outline-offset:2px}
 .gbtn{padding:5px 10px}
 .assets{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin:12px 2px 4px;min-height:14px}
 .achip{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:6px 11px;border-radius:9px;border:1px solid var(--edge);background:rgba(255,255,255,.015);color:var(--faint);cursor:pointer;transition:.15s}
 .achip:hover{background:rgba(255,255,255,.05)}
 .achip.on{color:var(--ink);background:rgba(255,255,255,.05)}
 .achip .dot{width:9px;height:9px;border-radius:3px;flex:none;opacity:.35}
 .achip.on .dot{opacity:1}
 .achip b{font-family:var(--mono);font-weight:700;font-size:12px}
 .achip .yrs{font-family:var(--mono);font-size:10px;color:var(--faint);font-weight:600}
 .achip .x{color:var(--faint);font-size:10px;margin-left:1px}
 .achip:hover .x{color:#ff6b6b}
 .apick{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:6px 12px;border-radius:9px;border:1px dashed var(--edge);background:transparent;color:var(--mut);cursor:pointer;transition:.15s}
 .apick:hover{color:var(--ink);background:rgba(255,255,255,.04);border-color:var(--faint)}
 .apick.on{color:var(--ink);border-style:solid;background:rgba(255,255,255,.05)}
 .picker{margin:2px 2px 8px;border:1px solid var(--edge);border-radius:12px;background:var(--panel2);padding:10px 12px 12px;max-height:360px;overflow:auto}
 .phead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
 .psearch{flex:1;font:inherit;font-size:12.5px;color:var(--ink);background:rgba(255,255,255,.03);border:1px solid var(--edge);border-radius:8px;padding:6px 10px;outline:none}
 .psearch:focus{border-color:var(--now)}
 .pcount{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}
 .pgroup{display:flex;align-items:baseline;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:12px 2px 7px}
 .pgroup .gc{letter-spacing:.02em;opacity:.6}
 .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:6px}
 .pitem{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:650;padding:6px 9px;border-radius:8px;border:1px solid var(--edge);background:rgba(255,255,255,.015);color:var(--mut);cursor:pointer;text-align:left;transition:.12s}
 .pitem:hover{background:rgba(255,255,255,.05);color:var(--ink)}
 .pitem.on{color:var(--ink);background:rgba(255,255,255,.06);border-color:var(--faint)}
 .pitem .dot{width:9px;height:9px;border-radius:3px;flex:none;opacity:.45}
 .pitem.on .dot{opacity:1}
 .pitem b{font-family:var(--mono);font-size:12px}
 .pitem .pyr{font-family:var(--mono);font-size:9.5px;color:var(--faint)}
 .pitem .pcap{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint)}
 .pempty{font-family:var(--mono);font-size:11.5px;color:var(--faint);padding:8px 2px}
 .stats{display:flex;flex-wrap:wrap;gap:6px 16px;margin:4px 2px 6px;min-height:12px;font-family:var(--mono);font-size:11.5px;color:var(--mut)}
 .stats .srow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
 .stats .m{display:inline-flex;align-items:baseline;gap:5px}
 .stats .sdot{width:8px;height:8px;border-radius:2px}
 .stats .k{color:var(--faint)}
 .stats b{color:var(--ink)}
 .stnote{font-family:var(--mono);font-size:11px;color:var(--faint)}
 .suggest{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:2px 2px 4px;font-family:var(--mono);font-size:12px;color:var(--mut);min-height:10px}
 .suggest .sg b{font-weight:750}
 #plot{position:relative;width:100%;cursor:crosshair;min-height:320px}
 #svg{width:100%;height:auto;display:block;touch-action:none}
 .band{fill:var(--faint);font-family:var(--mono);font-size:10px;letter-spacing:.10em;font-weight:600}
 .lbl2{fill:var(--faint);font-family:var(--mono);font-size:10.5px}
 .rax{fill:var(--faint);font-family:var(--mono);font-size:10.5px;text-anchor:start}
 .xtick{fill:var(--faint);font-family:var(--mono);font-size:9.5px}
 #tip{position:absolute;display:none;pointer-events:none;z-index:5;background:rgba(10,15,24,.92);backdrop-filter:blur(8px);border:1px solid var(--edge);color:#fff;border-radius:11px;padding:9px 11px;font-size:12px;line-height:1.55;box-shadow:0 10px 30px rgba(0,0,0,.55);min-width:150px}
 #tip .tdate{font-family:var(--mono);font-weight:700;margin-bottom:5px;color:var(--mut);font-size:11px;letter-spacing:.04em}
 #tip .trow{display:flex;align-items:center;gap:8px;white-space:nowrap}
 #tip .trow .tk{font-family:var(--mono);font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}
 #tip .trow b{margin-left:auto;font-family:var(--mono)}
 #tip .tsw{width:9px;height:9px;border-radius:2px;flex:none}
 .foot{color:var(--faint);font-size:11px;line-height:1.6;padding:10px 4px 12px}
 .status{font-family:var(--mono);font-size:12px;color:var(--mut);padding:40px 4px}
 @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head><body>
<div class="wrap"><div class="card">
 <div class="head"><span class="eyebrow">Crypto · Seasonal Index</span><span class="chip" id="chip">загрузка…</span></div>
 <div class="ctrls">
  <div class="grp"><span class="lab">шаг</span><button id="rD">1 день</button><button id="rH">1 час</button></div>
  <div class="grp"><span class="lab">лет</span><span id="lbBtns"></span></div>
  <div class="grp"><span class="lab">показать</span><button class="gbtn" id="normBtn">Норма</button><button class="gbtn" id="curBtn">Текущий</button><button class="gbtn" id="matchBtn">Похожий год</button><button class="gbtn" id="matchMBtn">Похожий мес</button></div>
  <button id="logBtn">Лог</button>
  <button id="zr">Сброс зума</button>
  <button id="resetAll">По умолчанию</button>
 </div>
 <div class="assets" id="assets"></div>
 <div class="picker" id="picker" hidden></div>
 <div class="stats" id="stats"></div>
 <div id="plot"><div id="svghost"><div class="status" id="status">Загрузка данных…</div></div><div id="tip"></div></div>
 <div class="foot">Обновление раз в сутки · UTC+3</div>
</div></div>
<script>
let D,M,COINS;
const PAL={BTC:"#FB7E14",ETH:"#818CF8",BNB:"#A3E635",SOL:"#A855F7",XRP:"#06B6D4",DOGE:"#EC4899",TRX:"#FB7185",LINK:"#3B82F6",BCH:"#22C55E",LTC:"#94A3B8",ZEC:"#FDE047",GRAM:"#EF4444",XAU:"#FFD24A",XAG:"#D6DCE6"};
const color=c=>PAL[c]||(D[c]&&D[c].color)||"#888";
const ML=[31,28,31,30,31,30,31,31,30,31,30,31];
const MSTART=[0,31,59,90,120,151,181,212,243,273,304,334];
const MGEN=["","января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const MSHORT=["ЯНВ","ФЕВ","МАР","АПР","МАЙ","ИЮН","ИЮЛ","АВГ","СЕН","ОКТ","НОЯ","ДЕК"];
const MNAME=["","январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
let res="D";
const ND=()=>res==="H"?M.H:M.Dn;
const PERDAY=()=>res==="H"?24:1;
let dom=[0,0], vy=[0,1];
const sel={};
let showCur=true, showMatch=false, showMatchMonth=false, showNorm=true, lookback="max", logScale=true;
let pickerOpen=false, pickerQ="";
const seaCache={}, matchCache={};
const VW=1000,VH=560,L=48,R=940,T=18,B=496;
const X=d=>L+(d-dom[0])/((dom[1]-dom[0])||1)*(R-L);
const viewPix=fr=>B-((fr-vy[0])/((vy[1]-vy[0])||1))*(B-T);
const YL=v=>viewPix(v/100);
function md(day0){let m=0,d=Math.max(0,Math.min(364,day0));while(m<11&&d>=ML[m]){d-=ML[m];m++;}return{mo:m+1,dd:d+1};}
function dlab(i){const pd=PERDAY();const day=Math.floor(i/pd),hr=res==="H"?i%24:null;const o=md(day);return o.dd+" "+MGEN[o.mo]+(hr!=null?", "+String(hr).padStart(2,"0")+":00":"");}
function bandsList(){const pd=PERDAY();const a=[];for(let m=0;m<12;m++){a.push([MSTART[m]*pd,(m<11?MSTART[m+1]:365)*pd,MSHORT[m]]);}return a;}
function years(c){return (D[c]&&D[c].yrs?D[c].yrs.length:0)+"л";}
const METALS=new Set(["XAU","XAG"]);
function isMetal(c){return METALS.has(c);}
function anyMetalSel(){return COINS.some(c=>sel[c]&&isMetal(c));}
function lookbackOptions(){return anyMetalSel()?[5,15,"max"]:[3,5,"max"];}
function lbButtons(){const opts=lookbackOptions();const el=document.getElementById("lbBtns");el.innerHTML="";opts.forEach(o=>{const b=document.createElement("button");b.className="gbtn"+(lookback===o?" on":"");b.textContent=o==="max"?"Макс":o;b.onclick=()=>setLB(o);el.appendChild(b);});}
function lastIdx(c){const a=D[c].cur;for(let i=a.length-1;i>=0;i--)if(a[i]!=null)return i;return -1;}
function corrW(a,b,lo,hi){let xs=[],ys=[];for(let i=lo;i<=hi;i++){const u=a[i],v=b[i];if(u==null||v==null||isNaN(u)||isNaN(v))continue;xs.push(u);ys.push(v);}const n=xs.length;if(n<6)return null;let mx=0,my=0;for(let i=0;i<n;i++){mx+=xs[i];my+=ys[i];}mx/=n;my/=n;let sxy=0,sxx=0,syy=0;for(let i=0;i<n;i++){const dx=xs[i]-mx,dy=ys[i]-my;sxy+=dx*dy;sxx+=dx*dx;syy+=dy*dy;}if(sxx<=0||syy<=0)return null;return sxy/Math.sqrt(sxx*syy);}
function monthStart(){const d=M.today_d;let m=0;for(let i=0;i<12;i++){if(MSTART[i]<=d)m=i;}return MSTART[m];}
function curMonth(){const d=M.today_d;let m=0;for(let i=0;i<12;i++){if(MSTART[i]<=d)m=i;}return m+1;}
function seasonal(c){const key=c+"|"+lookback;if(seaCache[key])return seaCache[key];const ys=D[c].yrs||[];if(!ys.length){return seaCache[key]={idx:null,avg:null,n:0};}
 const N=lookback==="max"?ys.length:Math.min(lookback,ys.length);const use=ys.slice(-N);const avg=new Array(M.Dn).fill(0);
 use.forEach(y=>{const p=D[c].years[String(y)];for(let i=0;i<M.Dn;i++)avg[i]+=p[i];});for(let i=0;i<M.Dn;i++)avg[i]/=N;
 let lo=Infinity,hi=-Infinity;avg.forEach(v=>{if(v<lo)lo=v;if(v>hi)hi=v;});const idx=avg.map(v=>hi>lo?(v-lo)/(hi-lo)*100:0);
 return seaCache[key]={idx,avg,n:N,used:use};}
function matches(c){if(matchCache[c]!==undefined)return matchCache[c];const ys=D[c].yrs||[];const Lx=lastIdx(c);if(Lx<10||!ys.length){return matchCache[c]=null;}
 const ms=monthStart();let by=null,bm=null;
 ys.forEach(y=>{const p=D[c].years[String(y)];const ry=corrW(D[c].cur,p,0,Lx);if(ry!=null&&(by==null||ry>by.r))by={year:y,r:ry};
   const rm=corrW(D[c].cur,p,ms,Lx);if(rm!=null&&(bm==null||rm>bm.r))bm={year:y,r:rm};});
 return matchCache[c]={year:by,month:bm};}
function matchPct(c,y){const p=D[c].years[String(y)];return p.map(v=>(Math.exp(v/100)-1)*100);}
function normSim(c,lo){const sd=seasonal(c);if(!sd.avg)return null;return corrW(D[c].cur,sd.avg,lo||0,lastIdx(c));}
function seriesList(){const a=[];COINS.forEach(c=>{if(!sel[c])return;
 if(res==="D"){if(showNorm){const sd=seasonal(c);if(sd.idx)a.push({coin:c,kind:"seasonal",axis:"L",data:sd.idx,w:2.1,dash:0});}
   if(showCur)a.push({coin:c,kind:"current",axis:"R",data:D[c].cur,w:1.8,dash:1,glow:1});
   const mm=matches(c);
   if(showMatch&&mm&&mm.year)a.push({coin:c,kind:"match",axis:"R",data:matchPct(c,mm.year.year),w:1.5,dash:2,year:mm.year.year,tag:"год"});
   if(showMatchMonth&&mm&&mm.month)a.push({coin:c,kind:"match",axis:"R",data:matchPct(c,mm.month.year),w:1.5,dash:3,year:mm.month.year,tag:"мес"});
 }else{if(showNorm&&D[c].sea_h)a.push({coin:c,kind:"seasonal",axis:"L",data:D[c].sea_h,w:2.1,dash:0});
   if(showCur&&D[c].cur_h)a.push({coin:c,kind:"current",axis:"R",data:D[c].cur_h,w:1.8,dash:1,glow:1});}
});return a;}
let rmin,rmax,YR;
function rT(v){return logScale?Math.log(Math.max(1e-6,(100+v)/100)):v;}
function rIT(t){return logScale?(Math.exp(t)-1)*100:t;}
function rscale(){let lo=Infinity,hi=-Infinity;seriesList().forEach(s=>{if(s.axis==="R")s.data.forEach(v=>{if(v!=null){const t=rT(v);if(t<lo)lo=t;if(t>hi)hi=t;}});});const z=rT(0);if(lo===Infinity){lo=z-1;hi=z+1;}if(z<lo)lo=z;if(z>hi)hi=z;const p=(hi-lo)*0.10||0.5;rmin=lo-p;rmax=hi+p;YR=v=>viewPix((rT(v)-rmin)/((rmax-rmin)||1));}
function path(data,axis){let o="",pen=false;for(let d=Math.floor(dom[0]);d<=Math.ceil(dom[1]);d++){const v=data[d];if(v==null){pen=false;continue;}const x=X(d).toFixed(1),y=(axis==="L"?YL(v):YR(v)).toFixed(1);o+=(pen?"L":"M")+x+" "+y+" ";pen=true;}return o.trim();}
function render(){rscale();const SR=seriesList();const hasLeft=SR.some(s=>s.axis==="L");
 let s='<svg id="svg" viewBox="0 0 '+VW+' '+VH+'" xmlns="http://www.w3.org/2000/svg">';
 s+='<defs><filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>';
 s+='<clipPath id="clip"><rect x="'+L+'" y="'+T+'" width="'+(R-L)+'" height="'+(B-T)+'"/></clipPath></defs>';
 for(let k=0;k<=4;k++){const fr=vy[0]+(vy[1]-vy[0])*k/4;const y=viewPix(fr).toFixed(1);const val=fr*100;s+='<line x1="'+L+'" x2="'+R+'" y1="'+y+'" y2="'+y+'" stroke="var(--grid)"/>';if(hasLeft)s+='<text class="lbl2" x="'+(L-8)+'" y="'+(+y+4)+'" text-anchor="end">'+(Math.abs(val-Math.round(val))<0.05?Math.round(val):val.toFixed(1))+'</text>';}
 for(let k=0;k<=4;k++){const fr=vy[0]+(vy[1]-vy[0])*k/4;const v=rIT(rmin+fr*(rmax-rmin));const y=viewPix(fr).toFixed(1);s+='<text class="rax" x="'+(R+8)+'" y="'+(+y+4)+'">'+(v>=0?"+":"")+v.toFixed(0)+'%</text>';}
 bandsList().forEach(([a,b,lab])=>{if(a>dom[0]&&a<dom[1]){const x=X(a).toFixed(1);s+='<line x1="'+x+'" x2="'+x+'" y1="'+T+'" y2="'+B+'" stroke="var(--grid)"/>';}const c=(Math.max(a,dom[0])+Math.min(b,dom[1]))/2;if(b>dom[0]&&a<dom[1])s+='<text class="band" x="'+X(c)+'" y="'+(T+12)+'" text-anchor="middle">'+lab+'</text>';});
 s+='<line x1="'+L+'" x2="'+R+'" y1="'+B+'" y2="'+B+'" stroke="var(--axis)"/>';
 const NT=6;for(let k=0;k<=NT;k++){const di=dom[0]+(dom[1]-dom[0])*k/NT;s+='<text class="xtick" x="'+X(di).toFixed(1)+'" y="'+(B+17)+'" text-anchor="middle">'+dlab(Math.round(di))+'</text>';}
 s+='<g clip-path="url(#clip)">';
 SR.forEach(se=>{const dd=path(se.data,se.axis);if(!dd)return;const col=color(se.coin);let st='';if(se.dash===1)st='stroke-dasharray="1 5" stroke-linecap="round"';else if(se.dash===2)st='stroke-dasharray="2 6" stroke-linecap="round" opacity="0.6"';else if(se.dash===3)st='stroke-dasharray="6 3" stroke-linecap="round" opacity="0.6"';const f=se.glow?' filter="url(#glow)"':'';s+='<path d="'+dd+'" fill="none" stroke="'+col+'" stroke-width="'+se.w+'" '+st+f+' stroke-linejoin="round"/>';});
 s+='</g>';
 s+='<line id="guide" x1="0" x2="0" y1="'+T+'" y2="'+B+'" stroke="var(--axis)" opacity="0"/>';
 s+='<line id="guideh" x1="'+L+'" x2="'+R+'" y1="0" y2="0" stroke="var(--axis)" opacity="0"/>';
 s+='<g id="guidehl" opacity="0"><rect x="'+(R+3)+'" y="-8" width="55" height="16" rx="3" fill="#0a0f18" stroke="var(--edge)"/><text class="rax" x="'+(R+8)+'" y="4"></text></g>';
 s+='</svg>';document.getElementById("svghost").innerHTML=s;}
function fmtCap(v){if(!v||v<=0)return"—";if(v>=1e12)return"$"+(v/1e12).toFixed(1)+"T";if(v>=1e9)return"$"+(v/1e9).toFixed(1)+"B";if(v>=1e6)return"$"+(v/1e6).toFixed(0)+"M";return"$"+v.toFixed(0);}
function tierOf(c){if(D[c]&&D[c].metal)return"metal";const m=(D[c]&&D[c].mcap)||0;if(m>=1e10)return"lg";if(m>=1e9)return"md";return"sm";}
const TIERS=[["lg","Крупная капитализация","≥ $10B"],["md","Средняя капитализация","$1–10B"],["sm","Малая капитализация","< $1B"],["metal","Металлы",""]];
function assets(){const el=document.getElementById("assets");el.innerHTML="";
  const on=COINS.filter(c=>sel[c]);
  on.forEach(c=>{const chip=document.createElement("button");chip.className="achip on";chip.tabIndex=0;chip.style.borderColor=color(c);
    let val="";if(showCur&&res==="D"){const a=D[c].cur,L=lastIdx(c);if(L>=0){const v=a[L];val=' <b style="color:'+(v>=0?"#46d39a":"#ff6b6b")+'">'+(v>=0?"+":"")+v.toFixed(0)+'%</b>';}}
    chip.innerHTML='<span class="dot" style="background:'+color(c)+'"></span>'+c+' <span class="yrs">'+years(c)+'</span>'+val+' <span class="x">✕</span>';
    const off=()=>{sel[c]=false;redraw();};chip.onclick=off;chip.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();off();}};el.appendChild(chip);});
  const add=document.createElement("button");add.className="apick"+(pickerOpen?" on":"");add.innerHTML=pickerOpen?"✕ Свернуть":("＋ Активы <span class=\"yrs\">"+COINS.length+"</span>");
  add.onclick=()=>{pickerOpen=!pickerOpen;pickerQ="";redraw();};el.appendChild(add);}
function picker(){const el=document.getElementById("picker");if(!pickerOpen){el.hidden=true;el.innerHTML="";return;}el.hidden=false;
  const q=(pickerQ||"").trim().toUpperCase();const nsel=COINS.filter(c=>sel[c]).length;
  let html='<div class="phead"><input id="psearch" class="psearch" placeholder="Поиск актива…" autocomplete="off" value="'+pickerQ.replace(/"/g,"")+'"><span class="pcount">выбрано '+nsel+' из '+COINS.length+'</span></div>';
  let shown=0;
  TIERS.forEach(([key,label,note])=>{const list=COINS.filter(c=>tierOf(c)===key&&(!q||c.includes(q)));if(!list.length)return;shown+=list.length;
    html+='<div class="pgroup">'+label+(note?' <span class="gc">'+note+'</span>':'')+'</div><div class="pgrid">';
    list.forEach(c=>{html+='<button class="pitem'+(sel[c]?" on":"")+'" data-c="'+c+'"><span class="dot" style="background:'+color(c)+'"></span><b>'+c+'</b><span class="pyr">'+years(c)+'</span><span class="pcap">'+fmtCap(D[c]&&D[c].mcap)+'</span></button>';});
    html+='</div>';});
  if(!shown)html+='<div class="pempty">Ничего не найдено по «'+pickerQ+'»</div>';
  el.innerHTML=html;
  const s=document.getElementById("psearch");s.oninput=e=>{pickerQ=e.target.value;picker();const n=document.getElementById("psearch");n.focus();n.setSelectionRange(n.value.length,n.value.length);};
  el.querySelectorAll(".pitem").forEach(b=>b.onclick=()=>{const c=b.getAttribute("data-c");sel[c]=!sel[c];redraw();});}
function stats(){const el=document.getElementById("stats");el.innerHTML="";
 if(res!=="D"){el.innerHTML='<span class="stnote">похожесть доступна в режиме «1 день»</span>';return;}
 const onc=COINS.filter(c=>sel[c]);if(!onc.length){return;}
 const P=v=>(v==null?"—":Math.round(v*100)+"%");const mn=MNAME[curMonth()];
 onc.forEach(c=>{const nt=normSim(c,0);const mm=matches(c);const by=mm&&mm.year,bmo=mm&&mm.month;
   const tc=nt==null?"var(--mut)":(nt<0?"#ff6b6b":(nt>=0.6?"#46d39a":"var(--ink)"));
   const row=document.createElement("span");row.className="srow";
   row.innerHTML='<span class="sdot" style="background:'+color(c)+'"></span><b>'+c+'</b>'
     +'<span class="m"><span class="k">схожесть с нормой:</span><span style="color:'+tc+'">'+P(nt)+'</span></span>'
     +'<span class="m"><span class="k">похожий год:</span><span>'+(by?by.year+" ("+P(by.r)+")":"—")+'</span></span>'
     +'<span class="m"><span class="k">похожий месяц:</span><span>'+(bmo?mn+" "+bmo.year+" ("+P(bmo.r)+")":"—")+'</span></span>';
   el.appendChild(row);});}
function vb(e){const svg=document.getElementById("svg");const r=svg.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*VW,y:(e.clientY-r.top)/r.height*VH};}
function region(p){if(p.y>B||p.y<T)return"x";if(p.x<L||p.x>R)return"y";return"zoom";}
function pxIndex(vx){let d=dom[0]+(vx-L)/(R-L)*(dom[1]-dom[0]);return Math.max(dom[0],Math.min(dom[1],d));}
function fracAt(vyc){const py=Math.max(T,Math.min(B,vyc));return vy[0]+((B-py)/(B-T))*(vy[1]-vy[0]);}
let drag=null;
function bind(){const host=document.getElementById("plot");const tip=document.getElementById("tip");
 host.onmousedown=e=>{const p=vb(e);drag={mode:region(p),lx:p.x,ly:p.y};};
 host.onmousemove=e=>{const r=host.getBoundingClientRect();
   if(drag){const p=vb(e);
     if(drag.mode==="x"||drag.mode==="zoom"){const span=dom[1]-dom[0];let di=(p.x-drag.lx)/(R-L)*span;drag.lx=p.x;let lo=dom[0]-di,hi=dom[1]-di;if(lo<0){hi-=lo;lo=0;}if(hi>ND()-1){lo-=(hi-(ND()-1));hi=ND()-1;}dom=[Math.max(0,lo),hi];}
     if(drag.mode==="zoom"){const span=vy[1]-vy[0];let df=(p.y-drag.ly)/(B-T)*span;let lo=vy[0]+df,hi=vy[1]+df;if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=(hi-1);hi=1;}vy=[Math.max(0,lo),Math.min(1,hi)];drag.ly=p.y;}
     else if(drag.mode==="y"){const span=vy[1]-vy[0];const k=Math.exp((p.y-drag.ly)*0.004);drag.ly=p.y;let ns=Math.min(1,Math.max(0.03,span*k));const c=(vy[0]+vy[1])/2;let lo=c-ns/2,hi=c+ns/2;if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=(hi-1);hi=1;}vy=[Math.max(0,lo),Math.min(1,hi)];}
     tip.style.display="none";render();return;}
   const pt=vb(e);const d=Math.round(pxIndex(pt.x));const g=document.getElementById("guide");if(g){g.setAttribute("x1",X(d));g.setAttribute("x2",X(d));g.setAttribute("opacity","0.45");}
   const py=Math.max(T,Math.min(B,pt.y));const gh=document.getElementById("guideh");if(gh){gh.setAttribute("y1",py);gh.setAttribute("y2",py);gh.setAttribute("opacity","0.45");}
   const gl=document.getElementById("guidehl");if(gl){gl.setAttribute("transform","translate(0,"+py.toFixed(1)+")");gl.setAttribute("opacity","1");const v=rIT(rmin+fracAt(pt.y)*(rmax-rmin));gl.querySelector("text").textContent=(v>=0?"+":"")+(Math.abs(v)>=100?v.toFixed(0):v.toFixed(1))+"%";}
   let html='<div class="tdate">'+dlab(d)+'</div>';let any=false;seriesList().forEach(se=>{const v=se.data[d];if(v==null)return;any=true;const lbl=se.kind==="seasonal"?"норма":(se.kind==="match"?(se.year+(se.tag?" "+se.tag:"")):"тек.");const txt=se.kind==="seasonal"?Math.round(v):((v>=0?"+":"")+v.toFixed(1)+"%");html+='<div class="trow"><span class="tsw" style="background:'+color(se.coin)+'"></span>'+se.coin+'<span class="tk">'+lbl+'</span><b>'+txt+'</b></div>';});
   if(!any){tip.style.display="none";return;}tip.innerHTML=html;tip.style.display="block";const px=e.clientX-r.left,tw=tip.offsetWidth;tip.style.left=Math.min(Math.max(px+16,4),r.width-tw-4)+"px";tip.style.top="4px";};
 host.onmouseup=()=>{drag=null;};host.onmouseleave=()=>{drag=null;tip.style.display="none";["guide","guideh","guidehl"].forEach(id=>{const g=document.getElementById(id);if(g)g.setAttribute("opacity","0");});};
 host.ondblclick=e=>{const reg=region(vb(e));if(reg==="x"){dom=[0,ND()-1];}else if(reg==="y"){vy=[0,1];}else{dom=[0,ND()-1];vy=[0,1];}redraw();};}
function redraw(){const opts=lookbackOptions();if(opts.indexOf(lookback)<0){lookback="max";for(const k in seaCache)delete seaCache[k];}render();assets();picker();stats();lbButtons();bind();}
function setRes(r){if(res===r)return;res=r;dom=[0,ND()-1];vy=[0,1];document.getElementById("rH").classList.toggle("on",r==="H");document.getElementById("rD").classList.toggle("on",r==="D");redraw();}
function setLB(v){lookback=v;for(const k in seaCache)delete seaCache[k];redraw();}
function start(){COINS=M.coins;
 COINS.forEach((c,i)=>{sel[c]=(i===0);});
 dom=[0,ND()-1];vy=[0,1];
 document.getElementById("chip").textContent="обновлено · "+(M.asof||"");
 document.getElementById("rH").onclick=()=>setRes("H");document.getElementById("rD").onclick=()=>setRes("D");
 const lg=document.getElementById("logBtn");lg.classList.toggle("on",logScale);lg.onclick=()=>{logScale=!logScale;lg.classList.toggle("on",logScale);redraw();};
 const plotEl=document.getElementById("plot");
 plotEl.addEventListener("wheel",e=>{if(!document.getElementById("svg"))return;e.preventDefault();const p=vb(e);
  if(e.shiftKey||p.x>R||p.x<L){const span=vy[1]-vy[0];const k=Math.exp(e.deltaY*0.0015);let ns=Math.min(1,Math.max(0.03,span*k));const f=fracAt(p.y);let lo=f-(f-vy[0])*(ns/span);let hi=lo+ns;if(lo<0){hi-=lo;lo=0;}if(hi>1){lo-=(hi-1);hi=1;}vy=[Math.max(0,lo),Math.min(1,hi)];}
  else if(Math.abs(e.deltaX)>Math.abs(e.deltaY)){const span=dom[1]-dom[0];const di=e.deltaX/(R-L)*span*1.4;let lo=dom[0]+di,hi=dom[1]+di;if(lo<0){hi-=lo;lo=0;}if(hi>ND()-1){lo-=(hi-(ND()-1));hi=ND()-1;}dom=[Math.max(0,lo),hi];}
  else{const span=dom[1]-dom[0];const k=Math.exp(e.deltaY*0.0015);const minS=res==="H"?12:3;let ns=Math.min(ND()-1,Math.max(minS,span*k));const i=pxIndex(p.x);let lo=i-(i-dom[0])*(ns/span);let hi=lo+ns;if(lo<0){hi-=lo;lo=0;}if(hi>ND()-1){lo-=(hi-(ND()-1));hi=ND()-1;}dom=[Math.max(0,lo),hi];}
  render();},{passive:false});
 const nb=document.getElementById("normBtn");nb.classList.toggle("on",showNorm);nb.onclick=()=>{showNorm=!showNorm;nb.classList.toggle("on",showNorm);redraw();};
 const cb=document.getElementById("curBtn");cb.classList.toggle("on",showCur);cb.onclick=()=>{showCur=!showCur;cb.classList.toggle("on",showCur);redraw();};
 const mb=document.getElementById("matchBtn");mb.onclick=()=>{showMatch=!showMatch;mb.classList.toggle("on",showMatch);redraw();};
 const mmb=document.getElementById("matchMBtn");mmb.onclick=()=>{showMatchMonth=!showMatchMonth;mmb.classList.toggle("on",showMatchMonth);redraw();};
 document.getElementById("zr").onclick=()=>{dom=[0,ND()-1];vy=[0,1];redraw();};
 document.getElementById("resetAll").onclick=()=>{res="D";lookback="max";logScale=true;showNorm=true;showCur=true;showMatch=false;showMatchMonth=false;pickerOpen=false;pickerQ="";COINS.forEach((c,i)=>{sel[c]=(i===0);});dom=[0,ND()-1];vy=[0,1];
   document.getElementById("rH").classList.remove("on");document.getElementById("rD").classList.add("on");
   document.getElementById("normBtn").classList.add("on");document.getElementById("logBtn").classList.add("on");document.getElementById("curBtn").classList.add("on");document.getElementById("matchBtn").classList.remove("on");document.getElementById("matchMBtn").classList.remove("on");redraw();};
 document.getElementById("rD").classList.add("on");
 redraw();window.addEventListener("resize",redraw);}
fetch("data.json?t="+Date.now()).then(r=>r.json()).then(d=>{D=d;M=d._meta;start();}).catch(e=>{document.getElementById("status").textContent="Не удалось загрузить data.json. Обновите страницу позже.";});
</script>
</body></html>
